function ladderStart(){
  let names=ladderNames(),rewards=ladderRewards(),n=names.length,bars=[],rows=Math.max(24,n*7);
  let minTarget=Math.max(n-1, 2*n);
  let maxTarget=Math.max(minTarget, 3*n);
  let target=minTarget+Math.floor(Math.random()*(maxTarget-minTarget+1)); // 총 2n~3n개 정도

  function makeCandidate(a){
    let rowA=2+Math.floor(Math.random()*(rows-4));
    let diagonal=Math.random()<.3;

    // 최대 약 30도까지만 기울어지게 제한
    let g=ladderGeom();
    let maxRowDiff=Math.max(1,Math.floor((Math.tan(Math.PI/6)*g.gap)/g.rowGap));
    maxRowDiff=Math.min(maxRowDiff,2);

    let rowDiff=diagonal ? (1+Math.floor(Math.random()*maxRowDiff)) : 0;
    let rowB=rowA + (Math.random()<.5 ? rowDiff : -rowDiff);
    if(rowB<1 || rowB>rows-1) return null;
    return {a,b:a+1,rowA,rowB};
  }

  function canAdd(c){
    return !bars.some(x=>{
      let points=[{c:x.a,r:x.rowA},{c:x.b,r:x.rowB}];

      let tooClose = points.some(p=>
        (p.c===c.a && Math.abs(p.r-c.rowA)<=1) ||
        (p.c===c.b && Math.abs(p.r-c.rowB)<=1)
      );

      let cross = false;
      if(x.a===c.a && x.b===c.b){
        cross = ((x.rowA-c.rowA) * (x.rowB-c.rowB) < 0);
      }

      return tooClose || cross;
    });
  }

  // 1) 세로줄 사이마다 최소 1개씩 보장
  for(let gap=0; gap<n-1; gap++){
    let added=false;
    for(let t=0;t<300;t++){
      let c=makeCandidate(gap);
      if(c && canAdd(c)){bars.push(c);added=true;break;}
    }
    // 정말 안 들어가면 안전한 가로줄로 강제 추가
    if(!added){
      let rowA=2+gap*2;
      bars.push({a:gap,b:gap+1,rowA,rowB:rowA});
    }
  }

  // 2) 나머지는 랜덤 추가
  let tries=0;
  while(bars.length<target && tries<2500){
    tries++;
    let a=Math.floor(Math.random()*(n-1));
    let c=makeCandidate(a);
    if(c && canAdd(c)) bars.push(c);
  }

  bars.sort((x,y)=>Math.min(x.rowA,x.rowB)-Math.min(y.rowA,y.rowB));
  ladderData={names,rewards,bars,started:true,rows};
  ladderResultBox.innerHTML='';
  ladderStartControls.style.display='none';
  ladderCountControls.style.display='none';
  ladderEndControls.style.display='none';
  ladderRunButtons.innerHTML='';
  document.querySelectorAll('.ladderNameInput').forEach((el,i)=>{el.readOnly=true;el.onclick=()=>ladderRun(i);});
  document.querySelectorAll('.ladderRewardInput').forEach(el=>{el.readOnly=true;});
  ladderDraw();
}
function ladderGeom(){
  const c=ladderCanvas;
  const stage=document.getElementById('ladderStage');
  const w=Math.max(620, Math.min(820, Math.round((stage&&stage.clientWidth?stage.clientWidth:860)-24)));
  const h=560;
  if(c.width!==w)c.width=w;
  if(c.height!==h)c.height=h;
  const n=ladderCount;
  const side=58;
  return{top:16,bottom:h-16,left:side,right:w-side,gap:(w-side*2)/(n-1),rowGap:(h-32)/(ladderData.rows||24)};
}
function ladderTrace(start){
  let g=ladderGeom(), col=start, pts=[{x:g.left+col*g.gap,y:g.top}];
  let currentRow=0;
  let used=new Set();

  for(let guard=0; guard<500; guard++){
    let candidates=[];
    ladderData.bars.forEach((bar,idx)=>{
      if(used.has(idx)) return;
      if(bar.a===col && bar.rowA>=currentRow) candidates.push({idx,bar,hereRow:bar.rowA,nextCol:bar.b,nextRow:bar.rowB});
      if(bar.b===col && bar.rowB>=currentRow) candidates.push({idx,bar,hereRow:bar.rowB,nextCol:bar.a,nextRow:bar.rowA});
    });

    candidates.sort((x,y)=>x.hereRow-y.hereRow);
    if(!candidates.length) break;

    let c=candidates[0];
    used.add(c.idx);

    let hereX=g.left+col*g.gap;
    let hereY=g.top+c.hereRow*g.rowGap;
    pts.push({x:hereX,y:hereY});

    col=c.nextCol;
    let nextX=g.left+col*g.gap;
    let nextY=g.top+c.nextRow*g.rowGap;
    pts.push({x:nextX,y:nextY});

    currentRow=c.nextRow+0.001;
  }

  pts.push({x:g.left+col*g.gap,y:g.bottom});
  return {end:col,pts};
}
function ladderDraw(pathPts, progress){
  const c=ladderCanvas,ctx=c.getContext('2d');ctx.clearRect(0,0,c.width,c.height);
  let g=ladderGeom(),n=ladderCount;
  ctx.lineCap='round';ctx.lineJoin='round';
  ctx.strokeStyle=ladderChallengeMode?'#7b5a18':'#ffc2d5';ctx.lineWidth=8;
  for(let i=0;i<n;i++){let x=g.left+i*g.gap;ctx.beginPath();ctx.moveTo(x,g.top);ctx.lineTo(x,g.bottom);ctx.stroke();}
  ctx.strokeStyle=ladderChallengeMode?'#f5d06a':'#ff91b8';ctx.lineWidth=7;
  ladderData.bars.forEach(b=>{
    let x1=g.left+b.a*g.gap, x2=g.left+b.b*g.gap;
    let y1=g.top+b.rowA*g.rowGap, y2=g.top+b.rowB*g.rowGap;
    ctx.beginPath();
    ctx.moveTo(x1,y1);
    ctx.lineTo(x2,y2);
    ctx.stroke();
  });
  if(pathPts&&pathPts.length>1){
    let segs=[],total=0;
    for(let i=1;i<pathPts.length;i++){
      let a=pathPts[i-1],b=pathPts[i],len=Math.hypot(b.x-a.x,b.y-a.y);
      segs.push({a,b,len});total+=len;
    }
    let target=total*Math.min(1,Math.max(0,progress||0)),used=0,last=pathPts[0];
    ctx.strokeStyle=ladderChallengeMode?'#ffe27a':'#ff4f95';ctx.lineWidth=10;ctx.beginPath();ctx.moveTo(last.x,last.y);
    for(const s of segs){
      if(used+s.len<=target){ctx.lineTo(s.b.x,s.b.y);last=s.b;used+=s.len;}
      else{
        let t=(target-used)/s.len;
        last={x:s.a.x+(s.b.x-s.a.x)*t,y:s.a.y+(s.b.y-s.a.y)*t};
        ctx.lineTo(last.x,last.y);break;
      }
    }
    ctx.stroke();
    ctx.fillStyle=ladderChallengeMode?'#ffe27a':'#ff4f95';ctx.beginPath();ctx.arc(last.x,last.y,10,0,Math.PI*2);ctx.fill();
  }
}
function ladderRun(idx){
  if(!ladderData.started)return;
  if(ladderAnim)cancelAnimationFrame(ladderAnim);
  let tr=ladderTrace(idx), start=null, duration=1500;
  ladderResultBox.innerHTML='';
  function frame(ts){
    if(!start)start=ts;
    let p=Math.min(1,(ts-start)/duration);
    ladderDraw(tr.pts,p);
    if(p<1)ladderAnim=requestAnimationFrame(frame);
    else {ladderResultBox.innerHTML=`<div class="ladder-result-item"><b>${ladderData.names[idx]}</b> → ${ladderData.rewards[tr.end]}</div>`;ladderEndControls.style.display='flex';ladderEndControls.querySelectorAll('button')[1].style.display=ladderChallengeMode?'none':'inline-flex';}
  }
  ladderAnim=requestAnimationFrame(frame);
}

function ladderStart(){
  let names=ladderNames(),rewards=ladderRewards(),n=names.length,bars=[],rows=Math.max(24,n*7);
  let minTarget=Math.max(n-1, 2*n);
  let maxTarget=Math.max(minTarget, 3*n);
  let target=minTarget+Math.floor(Math.random()*(maxTarget-minTarget+1)); // 총 2n~3n개 정도

  function makeCandidate(a){
    let rowA=2+Math.floor(Math.random()*(rows-4));
    let diagonal=Math.random()<.3;

    // 최대 약 30도까지만 기울어지게 제한
    let g=ladderGeom();
    let maxRowDiff=Math.max(1,Math.floor((Math.tan(Math.PI/6)*g.gap)/g.rowGap));
    maxRowDiff=Math.min(maxRowDiff,2);

    let rowDiff=diagonal ? (1+Math.floor(Math.random()*maxRowDiff)) : 0;
    let rowB=rowA + (Math.random()<.5 ? rowDiff : -rowDiff);
    if(rowB<1 || rowB>rows-1) return null;
    return {a,b:a+1,rowA,rowB};
  }

  function canAdd(c){
    return !bars.some(x=>{
      let points=[{c:x.a,r:x.rowA},{c:x.b,r:x.rowB}];

      let tooClose = points.some(p=>
        (p.c===c.a && Math.abs(p.r-c.rowA)<=1) ||
        (p.c===c.b && Math.abs(p.r-c.rowB)<=1)
      );

      let cross = false;
      if(x.a===c.a && x.b===c.b){
        cross = ((x.rowA-c.rowA) * (x.rowB-c.rowB) < 0);
      }

      return tooClose || cross;
    });
  }

  // 1) 세로줄 사이마다 최소 1개씩 보장
  for(let gap=0; gap<n-1; gap++){
    let added=false;
    for(let t=0;t<300;t++){
      let c=makeCandidate(gap);
      if(c && canAdd(c)){bars.push(c);added=true;break;}
    }
    // 정말 안 들어가면 안전한 가로줄로 강제 추가
    if(!added){
      let rowA=2+gap*2;

    }
  }

  let tries=0;

    let c=makeCandidate(a);
    if(c && canAdd(c)) bars.push(c);
  }

  ladderCountControls.style.display='none';

  ladderDraw();
}
function ladderGeom(){
  const c=ladderCanvas;
  const stage=document.getElementById('ladderStage');
  const w=Math.max(620, Math.min(820, Math.round((stage&&stage.clientWidth?stage.clientWidth:860)-24)));
  const h=560;
  if(c.width!==w)c.width=w;
  if(c.height!==h)c.height=h;
  const n=ladderCount;
  const side=58;
  return{top:16,bottom:h-16,left:side,right:w-side,gap:(w-side*2)/(n-1),rowGap:(h-32)/(ladderData.rows||24)};
}
function ladderTrace(start){
  let g=ladderGeom(), col=start, pts=[{x:g.left+col*g.gap,y:g.top}];
  let currentRow=0;
  let used=new Set();

  for(let guard=0; guard<500; guard++){
    let candidates=[];
    ladderData.bars.forEach((bar,idx)=>{
      if(used.has(idx)) return;
      if(bar.a===col && bar.rowA>=currentRow) candidates.push({idx,bar,hereRow:bar.rowA,nextCol:bar.b,nextRow:bar.rowB});
      if(bar.b===col && bar.rowB>=currentRow) candidates.push({idx,bar,hereRow:bar.rowB,nextCol:bar.a,nextRow:bar.rowA});
    });

    candidates.sort((x,y)=>x.hereRow-y.hereRow);
    if(!candidates.length) break;

    let c=candidates[0];
    used.add(c.idx);

    let hereX=g.left+col*g.gap;
    let hereY=g.top+c.hereRow*g.rowGap;
    pts.push({x:hereX,y:hereY});

    col=c.nextCol;
    let nextX=g.left+col*g.gap;
    let nextY=g.top+c.nextRow*g.rowGap;
    pts.push({x:nextX,y:nextY});

    currentRow=c.nextRow+0.001;
  }

  pts.push({x:g.left+col*g.gap,y:g.bottom});
  return {end:col,pts};
}
function ladderDraw(pathPts, progress){
  const c=ladderCanvas,ctx=c.getContext('2d');ctx.clearRect(0,0,c.width,c.height);
  let g=ladderGeom(),n=ladderCount;
  ctx.lineCap='round';ctx.lineJoin='round';
  ctx.strokeStyle=ladderChallengeMode?'#7b5a18':'#ffc2d5';ctx.lineWidth=8;
  for(let i=0;i<n;i++){let x=g.left+i*g.gap;ctx.beginPath();ctx.moveTo(x,g.top);ctx.lineTo(x,g.bottom);ctx.stroke();}
  ctx.strokeStyle=ladderChallengeMode?'#f5d06a':'#ff91b8';ctx.lineWidth=7;
  ladderData.bars.forEach(b=>{
    let x1=g.left+b.a*g.gap, x2=g.left+b.b*g.gap;
    let y1=g.top+b.rowA*g.rowGap, y2=g.top+b.rowB*g.rowGap;
    ctx.beginPath();
    ctx.moveTo(x1,y1);
    ctx.lineTo(x2,y2);
    ctx.stroke();
  });

    let segs=[],total=0;
    for(let i=1;i<pathPts.length;i++){
      let a=pathPts[i-1],b=pathPts[i],len=Math.hypot(b.x-a.x,b.y-a.y);

      if(used+s.len<=target){ctx.lineTo(s.b.x,s.b.y);last=s.b;used+=s.len;}
      else{
        let t=(target-used)/s.len;
        last={x:s.a.x+(s.b.x-s.a.x)*t,y:s.a.y+(s.b.y-s.a.y)*t};

      }

  }
}

  }
  ladderAnim=requestAnimationFrame(frame);
}
